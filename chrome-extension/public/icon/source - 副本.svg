<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="32" y1="9" x2="92" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F7FBFA" />
    </linearGradient>
    <linearGradient id="stemGrad" x1="34" y1="25" x2="58" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E40AF" />
      <stop offset="1" stop-color="#1D3082" />
    </linearGradient>
    <linearGradient id="faceTop" x1="58" y1="64" x2="102" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4FD7" />
      <stop offset="0.6" stop-color="#2D6FE8" />
      <stop offset="1" stop-color="#5B9CF5" />
    </linearGradient>
    <linearGradient id="faceBot" x1="58" y1="65" x2="102" y2="109" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C8B7F" />
      <stop offset="0.55" stop-color="#0E9B89" />
      <stop offset="1" stop-color="#0FB87E" />
    </linearGradient>
    <linearGradient id="edge" x1="14" y1="9" x2="112" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF4F2" />
      <stop offset="1" stop-color="#C9D8D4" />
    </linearGradient>
    <filter id="ambient" x="0" y="0" width="128" height="128" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#152725" flood-opacity="0.10" />
    </filter>
    <filter id="markShadow" x="24" y="20" width="90" height="90" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="2.4" flood-color="#0F2E31" flood-opacity="0.16" />
    </filter>
  </defs>

  <!-- Tile background -->
  <rect x="6" y="5" width="116" height="118" rx="29" fill="url(#tile)" filter="url(#ambient)" />
  <rect x="6.5" y="5.5" width="115" height="117" rx="28.5" stroke="url(#edge)" />

  <g filter="url(#markShadow)">
    <!-- STEM — book spine, sharp rectangular edges -->
    <rect x="34" y="26" width="24" height="76" rx="1.5" fill="url(#stemGrad)" />
    <!-- spine dark left edge — simulates thickness -->
    <rect x="34" y="26" width="4" height="76" rx="1.5" fill="#0F1F5C" opacity="0.45" />
    <!-- spine right edge shine -->
    <rect x="56.5" y="26" width="1.2" height="76" rx="1.5" fill="white" opacity="0.10" />

    <!-- UPPER FACE — wider K arm, darkened blue -->
    <polygon points="58,64  76,28  90,28  108,42  82,64" fill="url(#faceTop)" />
    <!-- upper face inner sheen -->
    <polygon points="60,60  76,30  88,30  76,48" fill="white" opacity="0.10" />

    <!-- LOWER FACE — mirror K arm, teal-emerald -->
    <polygon points="58,65  82,65  108,86  90,100  76,100" fill="url(#faceBot)" />
    <!-- lower face inner sheen -->
    <polygon points="60,67  76,67  84,76  68,88" fill="white" opacity="0.08" />

    <!-- Fold crease — structural seam where faces meet -->
    <line x1="58" y1="64.5" x2="82" y2="64.5" stroke="#0F2E5C" stroke-width="1" opacity="0.20" />
  </g>

</svg>
